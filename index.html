<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Striver A2Z DSA Tracker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #141414; --surface2: #1a1a1a; --surface3: #222;
    --border: #2a2a2a; --border2: #333; --text: #e8e8e8; --text2: #999; --text3: #555;
    --accent: #7c6af7; --green: #4ade80; --green-dim: #0f2b1a;
    --easy: #4ade80; --medium: #fbbf24; --hard: #f87171;
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; line-height:1.5; min-height:100vh; }

  /* ── Login Screen ── */
  #login-screen {
    position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:32px; z-index:100;
  }
  #login-screen.hidden { display:none; }
  .login-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:40px 48px; display:flex; flex-direction:column; align-items:center; gap:20px;
    max-width:380px; width:90%;
  }
  .login-logo { font-size:28px; font-weight:700; letter-spacing:-0.5px; }
  .login-logo span { color:var(--accent); }
  .login-sub { font-size:13px; color:var(--text2); text-align:center; line-height:1.6; }
  .google-btn {
    display:flex; align-items:center; gap:10px; background:#fff; color:#3c4043;
    border:none; border-radius:6px; padding:10px 20px; font-size:14px; font-weight:500;
    cursor:pointer; width:100%; justify-content:center; transition:box-shadow 0.15s;
  }
  .google-btn:hover { box-shadow:0 2px 8px rgba(0,0,0,0.3); }
  .google-btn svg { flex-shrink:0; }
  .login-note { font-size:11px; color:var(--text3); text-align:center; }

  /* ── App Layout ── */
  #app { display:flex; height:100vh; overflow:hidden; opacity:0; transition:opacity 0.2s; }
  #app.visible { opacity:1; }

  /* Sidebar */
  .sidebar { width:260px; min-width:260px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .sidebar-header { padding:16px 16px 12px; border-bottom:1px solid var(--border); }
  .sidebar-title { font-size:15px; font-weight:600; }
  .sidebar-sub { font-size:11px; color:var(--text2); margin-top:1px; }
  .user-bar { display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border); }
  .user-avatar { width:26px; height:26px; border-radius:50%; object-fit:cover; }
  .user-avatar-placeholder { width:26px; height:26px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; flex-shrink:0; }
  .user-name { font-size:12px; color:var(--text2); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .signout-btn { font-size:11px; color:var(--text3); cursor:pointer; padding:3px 6px; border-radius:3px; flex-shrink:0; }
  .signout-btn:hover { color:var(--text2); background:var(--surface3); }
  .overall-progress { padding:10px 16px; border-bottom:1px solid var(--border); }
  .progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text2); margin-bottom:5px; }
  .progress-bar { height:3px; background:var(--border2); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s; }
  .topic-list { flex:1; overflow-y:auto; padding:6px 0; }
  .topic-list::-webkit-scrollbar { width:3px; }
  .topic-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  .topic-item { padding:7px 16px; cursor:pointer; border-left:2px solid transparent; transition:background 0.12s; }
  .topic-item:hover { background:var(--surface2); }
  .topic-item.active { background:var(--surface3); border-left-color:var(--accent); }
  .topic-item-name { font-size:12.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .topic-item-meta { display:flex; align-items:center; gap:6px; margin-top:3px; }
  .topic-mini-progress { flex:1; height:2px; background:var(--border2); border-radius:1px; overflow:hidden; }
  .topic-mini-fill { height:100%; background:var(--accent); border-radius:1px; transition:width 0.3s; }
  .topic-count { font-size:10px; color:var(--text3); white-space:nowrap; }

  /* Main */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .main-header { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--surface); }
  .main-header h2 { font-size:15px; font-weight:600; }
  .header-stats { display:flex; gap:14px; align-items:center; }
  .stat-badge { font-size:11px; color:var(--text2); display:flex; align-items:center; gap:4px; }
  .stat-dot { width:5px; height:5px; border-radius:50%; }
  .search-box { padding:0 24px 10px; border-bottom:1px solid var(--border); background:var(--surface); padding-top:10px; }
  .search-input { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:6px 12px; color:var(--text); font-size:13px; outline:none; transition:border-color 0.15s; }
  .search-input::placeholder { color:var(--text3); }
  .search-input:focus { border-color:var(--accent); }
  .problem-list { flex:1; overflow-y:auto; padding:8px 24px 24px; }
  .problem-list::-webkit-scrollbar { width:3px; }
  .problem-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  .subtopic-group { margin-top:14px; }
  .subtopic-header { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--text3); padding:5px 0; border-bottom:1px solid var(--border); margin-bottom:3px; display:flex; justify-content:space-between; align-items:center; }
  .subtopic-count { font-weight:400; text-transform:none; letter-spacing:0; }
  .problem-row { display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:5px; margin:1px 0; transition:background 0.1s; }
  .problem-row:hover { background:var(--surface2); }
  .problem-row.done { background:var(--green-dim); }
  .problem-check { width:15px; height:15px; border:1.5px solid var(--border2); border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; transition:all 0.12s; }
  .problem-check.checked { background:var(--green); border-color:var(--green); }
  .problem-check.checked::after { content:''; width:8px; height:5px; border-left:2px solid #0d0d0d; border-bottom:2px solid #0d0d0d; transform:rotate(-45deg) translateY(-1px); display:block; }
  .problem-name { flex:1; font-size:13px; min-width:0; }
  .problem-row.done .problem-name { color:var(--text2); text-decoration:line-through; text-decoration-color:var(--text3); }
  .diff-badge { font-size:10px; font-weight:500; padding:2px 5px; border-radius:3px; flex-shrink:0; }
  .diff-easy { color:var(--easy); background:#0f2b1a; }
  .diff-medium { color:var(--medium); background:#2b1f0a; }
  .diff-hard { color:var(--hard); background:#2b0f0f; }
  .problem-actions { display:flex; gap:4px; align-items:center; flex-shrink:0; }
  .icon-btn { width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:4px; cursor:pointer; color:var(--text3); transition:all 0.1s; text-decoration:none; }
  .icon-btn:hover { background:var(--surface3); color:var(--text2); }
  .icon-btn.has-note { color:var(--accent); }

  /* Panel (right side) */
  .notes-panel { width:0; border-left:0 solid var(--border); background:var(--surface); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; transition:width 0.2s ease; }
  .notes-panel.open { width:360px; border-left-width:1px; }
  .notes-header { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; min-width:0; }
  .notes-header h3 { font-size:12.5px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .close-btn { width:22px; height:22px; display:flex; align-items:center; justify-content:center; border-radius:3px; cursor:pointer; color:var(--text3); font-size:16px; flex-shrink:0; }
  .close-btn:hover { background:var(--surface3); color:var(--text2); }
  /* Tab content area — position:relative so panes can fill it absolutely */
  .panel-body { flex:1; position:relative; min-height:0; overflow:hidden; }
  /* Each pane fills the body, toggled via opacity/pointer-events (avoids display:none+flex:1 bug) */
  .pane { position:absolute; inset:0; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity 0.1s; }
  .pane.active { opacity:1; pointer-events:all; }
  /* Notes pane internals */
  .notes-links { padding:8px 14px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid var(--border); flex-shrink:0; }
  .link-chip { font-size:11px; padding:3px 8px; border-radius:4px; background:var(--surface2); border:1px solid var(--border2); color:var(--text2); text-decoration:none; transition:all 0.1s; display:flex; align-items:center; gap:3px; white-space:nowrap; }
  .link-chip:hover { border-color:var(--accent); color:var(--accent); }
  .notes-textarea { flex:1; min-height:0; background:transparent; border:none; outline:none; color:var(--text); font-family:inherit; font-size:13px; line-height:1.7; padding:12px 14px; resize:none; overflow-y:auto; }
  .notes-textarea::placeholder { color:var(--text3); }
  .notes-footer { padding:8px 14px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .save-hint { font-size:10px; color:var(--text3); }
  .saved-indicator { font-size:10px; color:var(--green); opacity:0; transition:opacity 0.3s; }
  .saved-indicator.show { opacity:1; }

  /* Sync indicator */
  .sync-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-left:6px; transition:background 0.2s; }
  .sync-dot.syncing { background:var(--medium); animation:pulse 1s infinite; }
  .sync-dot.error { background:var(--hard); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text3); gap:8px; padding:60px 0; }
  * { scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }

  /* Panel tabs */
  .panel-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .panel-tab { flex:1; padding:10px 0; text-align:center; font-size:12px; font-weight:500; cursor:pointer; color:var(--text3); border-bottom:2px solid transparent; transition:all 0.12s; user-select:none; }
  .panel-tab.active { color:var(--text); border-bottom-color:var(--accent); }
  .panel-tab:hover:not(.active) { color:var(--text2); }

  /* Solution pane internals */
  .sol-scroll { flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; }
  .sol-scroll::-webkit-scrollbar { width:3px; }
  .sol-scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  .sol-links { padding:10px 14px 6px; display:flex; gap:6px; flex-wrap:wrap; border-bottom:1px solid var(--border); flex-shrink:0; }
  .sol-cards { padding:10px 14px 16px; display:flex; flex-direction:column; gap:8px; }
  .sol-card { background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:10px 12px; }
  .sol-card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
  .sol-label { font-size:10.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; }
  .sol-label.brute { color:#f87171; }
  .sol-label.better { color:#fbbf24; }
  .sol-label.optimal { color:#4ade80; }
  .sol-complexity { font-size:10px; color:var(--text3); font-family:monospace; }
  .sol-desc { font-size:12.5px; color:var(--text2); line-height:1.65; }
  .sol-locked { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text3); padding:30px 20px; text-align:center; }
  .sol-locked svg { opacity:0.35; }
  .sol-locked p { font-size:12px; line-height:1.6; }
  .sol-no-data { font-size:12px; color:var(--text3); padding:20px 14px; text-align:center; line-height:1.6; }
</style>
</head>

  <div class="login-card">
    <div class="login-logo">Striver <span>A2Z</span></div>

<!-- App -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div style="display:flex;align-items:center;gap:8px">
        <img src="favicon.svg" width="22" height="22" style="border-radius:5px;flex-shrink:0">

  <div class="notes-panel" id="notes-panel">
    <div class="notes-header">
      <h3 id="notes-title">—</h3>
      <div class="close-btn" onclick="closeNotes()">×</div>
    </div>
    <div class="panel-tabs">
      <div class="panel-tab active" id="tab-notes" onclick="switchTab('notes')">Notes</div>
      <div class="panel-tab" id="tab-solution" onclick="switchTab('solution')">Solution</div>
    </div>
    <div class="panel-body">

      <div class="pane" id="pane-solution">
        <div class="sol-scroll" id="sol-scroll"></div>
      </div>
    </div>
  </div>
</div>

  sub1:{steps:[{"label": "brute", "tc": "O(2^n)", "sc": "O(n)", "desc": "Generate all binary strings by recursively appending '0' and '1' to each prefix of the string."}, {"label": "optimal", "tc": "O(2^n)", "sc": "O(n)", "desc": "Use a recursive function with two parameters: the current length of the binary string and the current string itself, building all combinations by appending '0' or '1'."}]},
  sub10:{steps:[{"label": "brute", "tc": "O(2^n)", "sc": "O(n)", "desc": "Generate all combinations of numbers from 1 to 9 and check if their sum equals k. Use recursion to explore all possibilities."}, {"label": "optimal", "tc": "O(C(9,n))", "sc": "O(n)", "desc": "Use backtracking to explore combinations of numbers from 1 to 9. Recursively build combinations and backtrack when necessary to find valid ones that sum to k."}]},
  sub11:{steps:[{"label": "brute", "tc": "O(4^n * n)", "sc": "O(n)", "desc": "Generate all combinations by recursively iterating through each digit's possible letters and concatenating them. The time complexity is exponential due to the branching factor of 4 (except for '7' and '9')."}, {"label": "optimal", "tc": "O(4^n)", "sc": "O(n)", "desc": "Use a backtracking approach to explore all possible combinations. This method generates each combination in a single path of recursion, optimizing space complexity by avoiding the need for additional data structures like arrays or strings."}]},
  sub3:{steps:[{"label": "brute", "tc": "O(2^n)", "sc": "O(n)", "desc": "Generate all subsequences by iterating through each element and deciding to include or exclude it. Use recursion with backtracking."}, {"label": "optimal", "tc": "O(2^n)", "sc": "O(n)", "desc": "Use a bitmasking technique where each bit represents whether an element is included in the current subsequence. Iterate through all possible bitmasks from 0 to 2^n - 1 to generate subsequences."}]},
  sub4:{steps:[{"label": "brute", "tc": "O(2^n)", "sc": "O(n)", "desc": "Generate all subsequences using recursion and count those with sum K. Uses exponential time due to all subsets being considered."}, {"label": "optimal", "tc": "O(n * k)", "sc": "O(k)", "desc": "Use dynamic programming with a 1D array to store the number of ways to achieve each sum up to K. Iterate through the array and update counts for each element in the sequence."}]},
  sub5:{steps:[{"label": "brute", "tc": "O(2^n)", "sc": "O(n)", "desc": "Generate all subsequences of the array and check if any subsequence has a sum equal to K. This involves exploring each element either being included or excluded."}, {"label": "optimal", "tc": "O(n * k)", "sc": "O(k)", "desc": "Use dynamic programming to build a table where dp[i][j] indicates if there's a subsequence of the first i elements that sums to j. Iterate through each element and update the table accordingly."}]},
  sub7:{steps:[{"label": "brute", "tc": "O(2^n * n)", "sc": "O(n)", "desc": "Generate all subsets of candidates. Filter those that sum up to target and remove duplicates."}, {"label": "optimal", "tc": "O(2^n * n)", "sc": "O(n)", "desc": "Sort candidates first. Use backtracking to explore possible combinations, skipping duplicates during the process."}]},
  sub8:{steps:[{"label": "brute", "tc": "O(2^n)", "sc": "O(n)", "desc": "Generate all subsets and check their sums. This approach has exponential time complexity."}, {"label": "optimal", "tc": "O(2^n * n)", "sc": "O(n)", "desc": "Use a recursive function to explore all subsets, checking each subset's sum against the target."}]},
  sub9:{steps:[{"label": "brute", "tc": "O(2^n * n)", "sc": "O(n)", "desc": "Generate all subsets using recursion and store unique ones."}, {"label": "optimal", "tc": "O(2^n)", "sc": "O(n)", "desc": "Sort the array to avoid duplicates, then use backtracking to explore all subsets while skipping duplicates."}]},
  sw2:{steps:[{"label": "brute", "tc": "O(n^2)", "sc": "O(1)", "desc": "Iterate through each subarray and count flips needed. Track the maximum consecutive ones."}, {"label": "optimal", "tc": "O(n)", "sc": "O(1)", "desc": "Use a sliding window to keep track of zeros. Expand window if zero count is less than k, shrink otherwise. Max length of window gives the result."}]},
  sw3:{steps:[{"label": "brute", "tc": "O(n^2)", "sc": "O(1)", "desc": "Iterate over all possible subarrays and check if they contain at most two distinct types of fruits."}, {"label": "optimal", "tc": "O(n)", "sc": "O(1)", "desc": "Use a sliding window to keep track of the number of each fruit type within the current window. Expand the window by moving the right pointer and shrink it from the left when more than two types of fruits are found."}]},
  sw4:{steps:[{"label": "brute", "tc": "O(n^2)", "sc": "O(1)", "desc": "Check all substrings and count character replacements needed. Find the longest substring that can be formed with k replacements."}, {"label": "optimal", "tc": "O(n)", "sc": "O(1)", "desc": "Use a sliding window to maintain a window of characters where at most k replacements are needed. Expand the window by including new characters and shrink it from the left if necessary."}]},
  sw5:{steps:[{"label": "brute", "tc": "O(n^2)", "sc": "O(1)", "desc": "Check all possible subarrays and count those with a sum equal to target."}, {"label": "optimal", "tc": "O(n)", "sc": "O(n)", "desc": "Use a hashmap to store the prefix sums and their frequencies to efficiently find subarrays with the given sum."}]},
  sw6:{steps:[{"label": "brute", "tc": "O(n^3)", "sc": "O(1)", "desc": "Generate all possible subarrays and count those with an even number of odd numbers."}, {"label": "optimal", "tc": "O(n)", "sc": "O(1)", "desc": "Use a sliding window to keep track of the current number of odd numbers in the window. Expand the window by moving the right pointer and shrink it by moving the left pointer when the condition is met."}]},
  sw7:{steps:[{"label": "brute", "tc": "O(n^3)", "sc": "O(1)", "desc": "Check every possible substring of length 3 or more and count those that contain all three characters."}, {"label": "optimal", "tc": "O(n)", "sc": "O(1)", "desc": "Use a sliding window to track the minimum length of a substring containing all three characters by maintaining counts of each character."}]},
  sw8:{steps:[{"label": "brute", "tc": "O(n^3)", "sc": "O(1)", "desc": "Consider all possible subsequences and calculate their sums. Track the maximum sum encountered."}, {"label": "optimal", "tc": "O(n log n)", "sc": "O(1)", "desc": "Sort the cards, then use a sliding window of size k (half the length of the array) to find the minimum sum of any subsequence of size k. Subtract this from the total sum of all cards to get the maximum points obtainable."}]},
  swh1:{steps:[{"label": "brute", "tc": "O(n^2 * k)", "sc": "O(k)", "desc": "Check all substrings and use a set to track distinct characters. If more than k, skip."}, {"label": "optimal", "tc": "O(n)", "sc": "O(k)", "desc": "Use a sliding window with two pointers and a hashmap to count character occurrences. Expand and contract window based on distinct character count."}]},
  swh2:{steps:[{"label": "brute", "tc": "O(n^3)", "sc": "O(k)", "desc": "Iterate through all subarrays and count unique integers using a hash set."}, {"label": "optimal", "tc": "O(n)", "sc": "O(k)", "desc": "Use two pointers to maintain a sliding window that contains at most k distinct integers, counting valid subarrays as the window expands."}]},
  swh4:{steps:[{"label": "brute", "tc": "O(n^2)", "sc": "O(1)", "desc": "Iterate through all possible substrings of the given string and check if each substring contains the subsequence. Track the minimum length of such substrings."}, {"label": "optimal", "tc": "O(n)", "sc": "O(k)", "desc": "Use a sliding window approach with two pointers to find the smallest window that contains all characters of the subsequence. Maintain a frequency map of the subsequence and adjust the window size accordingly."}]},
  t2:{steps:[{"label": "brute", "tc": "O(n*m*k)", "sc": "O(n*m)", "desc": "Build a Trie from all words. For each query, traverse the Trie to count matching prefix and word."}, {"label": "optimal", "tc": "O(k) per query", "sc": "O(1)", "desc": "During insertion, maintain two additional counters: one for total words ending at a node and another for total nodes in the subtree. This allows quick queries of word count and prefix count."}]},
  t3:{steps:[{"label": "brute", "tc": "O(n^2)", "sc": "O(1)", "desc": "Check each prefix of every string and keep track of the longest valid one."}, {"label": "optimal", "tc": "O(n * m + n * log n)", "sc": "O(m)", "desc": "Sort strings lexicographically, then compare consecutive strings to find the longest common prefix starting from the first character of each."}]},
  t4:{steps:[{"label": "brute", "tc": "O(n^3)", "sc": "O(1)", "desc": "Generate all possible substrings and store them in a set to ensure uniqueness. Count the number of elements in the set."}, {"label": "optimal", "tc": "O(n^2 * log n)", "sc": "O(n^2)", "desc": "Use a Trie to insert all substrings and count nodes, which represent distinct substrings. Inserting each substring into the Trie takes linear time in the length of the substring."}]},
  t5:{steps:[{"label": "brute", "tc": "O(n^2 * k)", "sc": "O(k)", "desc": "Check all pairs of numbers and compute their XOR. This results in a nested loop where each number is paired with every other number."}, {"label": "optimal", "tc": "O(n * k)", "sc": "O(k^2)", "desc": "Use a Trie to store the binary representations of numbers. Traverse the Trie for each number and count XOR values, utilizing the properties of Trie nodes to efficiently find the maximum XOR pair."}]},
  t7:{steps:[{"label": "brute", "tc": "O(n^2)", "sc": "O(1)", "desc": "Iterate through all pairs of elements and compute their XOR. Track the maximum XOR found."}, {"label": "optimal", "tc": "O(n log m)", "sc": "O(m)", "desc": "Use a trie to store the binary representation of numbers. For each number, find the maximum XOR with another number in the trie by considering complementary bits."}]},
};

// ─── Problem lookup map (avoids JSON.stringify-in-HTML-attribute bug) ────────
const PMAP = {};
DATA.forEach(t => t.subtopics.forEach(s => s.problems.forEach(p => { PMAP[p.id] = p; })));

// ─── State ───────────────────────────────────────────────────────────────────
let state = { activeTopicId: DATA[0].id, checked: {}, notes: {}, activeNoteId: null, activeTab: 'notes', search: '' };
let currentUser = null;
let unsubFirestore = null;
let saveTimeout = null;
let notesSaveTimeout = null;

// ─── Helpers ─────────────────────────────────────────────────────────────────
const getAllProblems = () => DATA.flatMap(t => t.subtopics.flatMap(s => s.problems));
const getTopicProblems = id => { const t = DATA.find(x => x.id === id); return t ? t.subtopics.flatMap(s => s.problems) : []; };
const countDone = ps => ps.filter(p => state.checked[p.id]).length;

function setSyncDot(status) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
window.signInWithGoogle = async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
};

window.doSignOut = async () => {
  if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }
  await signOut(auth);
};

onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    // User info
    const nameEl = document.getElementById('user-name-el');
    const avatarEl = document.getElementById('user-avatar-el');
    nameEl.textContent = user.displayName || user.email;
    if (user.photoURL) {
      avatarEl.innerHTML = `<img class="user-avatar" src="${user.photoURL}" referrerpolicy="no-referrer">`;
    } else {
      const initials = (user.displayName || user.email || 'U').slice(0,1).toUpperCase();
      avatarEl.innerHTML = `<div class="user-avatar-placeholder">${initials}</div>`;
    }
    // Load data from Firestore with real-time listener
    setupFirestoreListener(user.uid);
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app').classList.remove('visible');
    if (unsubFirestore) { unsubFirestore(); unsubFirestore = null; }
  }
});

function setupFirestoreListener(uid) {
  setSyncDot('syncing');
  const ref = doc(db, 'users', uid, 'data', 'progress');
  unsubFirestore = onSnapshot(ref, snap => {
    if (snap.exists()) {
      const data = snap.data();
      state.checked = data.checked || {};
      state.notes   = data.notes   || {};
    }
    setSyncDot('ok');
    renderSidebar();
    renderMain();
    updateOverallProgress();
  }, err => { console.error(err); setSyncDot('error'); });
}

async function persistToFirestore() {
  if (!currentUser) return;
  setSyncDot('syncing');
  try {
    const ref = doc(db, 'users', currentUser.uid, 'data', 'progress');
    await setDoc(ref, { checked: state.checked, notes: state.notes }, { merge: true });
    setSyncDot('ok');
  } catch(e) { console.error(e); setSyncDot('error'); }
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(persistToFirestore, 800);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function updateOverallProgress() {
  const all = getAllProblems(), done = countDone(all);
  document.getElementById('overall-count').textContent = `${done} / ${all.length}`;
  document.getElementById('overall-fill').style.width = `${all.length ? done/all.length*100 : 0}%`;
}

function renderSidebar() {
  document.getElementById('topic-list').innerHTML = DATA.map(t => {
    const ps = getTopicProblems(t.id), done = countDone(ps);
    const pct = ps.length ? done/ps.length*100 : 0;
    return `<div class="topic-item ${t.id===state.activeTopicId?'active':''}" onclick="selectTopic('${t.id}')">
      <div class="topic-item-name">${t.name}</div>
      <div class="topic-item-meta">
        <div class="topic-mini-progress"><div class="topic-mini-fill" style="width:${pct}%"></div></div>
        <span class="topic-count">${done}/${ps.length}</span>
      </div>
    </div>`;
  }).join('');
}

function renderMain() {
  const topic = DATA.find(t => t.id === state.activeTopicId);
  if (!topic) return;
  document.getElementById('topic-title').textContent = topic.name;
  const ps = getTopicProblems(topic.id);
  const done = countDone(ps);
  const easy = ps.filter(p=>p.diff==='easy').length;
  const med  = ps.filter(p=>p.diff==='medium').length;
  const hard = ps.filter(p=>p.diff==='hard').length;
  document.getElementById('header-stats').innerHTML = `
    <span class="stat-badge"><span class="stat-dot" style="background:var(--easy)"></span>${easy} easy</span>
    <span class="stat-badge"><span class="stat-dot" style="background:var(--medium)"></span>${med} medium</span>
    <span class="stat-badge"><span class="stat-dot" style="background:var(--hard)"></span>${hard} hard</span>
    <span class="stat-badge" style="color:var(--text)">${done}/${ps.length} done</span>`;
  const search = state.search.toLowerCase();
  let html = '';
  topic.subtopics.forEach(sub => {
    const filtered = sub.problems.filter(p => !search || p.name.toLowerCase().includes(search));
    if (!filtered.length) return;
    const subDone = countDone(filtered);
    html += `<div class="subtopic-group">
      <div class="subtopic-header"><span>${sub.name}</span><span class="subtopic-count">${subDone}/${filtered.length}</span></div>`;
    filtered.forEach(p => {
      const checked = !!state.checked[p.id];
      const hasNote = !!(state.notes[p.id] && state.notes[p.id].trim());
      const sol = SOLUTIONS[p.id] || GENERATED_SOLUTIONS[p.id];
      const extLink = p.lc || TUF[p.id] || sol?.tuf || ('https://www.google.com/search?q=' + encodeURIComponent(p.name + ' site:takeuforward.org'));
      const extTitle = p.lc ? 'LeetCode' : 'TakeUForward';
      const lcIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
      const noteIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      html += `<div class="problem-row ${checked?'done':''}" id="row-${p.id}">
        <div class="problem-check ${checked?'checked':''}" onclick="toggleCheck(event,'${p.id}')"></div>
        <span class="problem-name">${escHtml(p.name)}</span>
        <span class="diff-badge diff-${p.diff}">${p.diff}</span>
        <div class="problem-actions">
          <a class="icon-btn" href="${extLink}" target="_blank" onclick="event.stopPropagation()" title="${extTitle}">${lcIcon}</a>
          <div class="icon-btn ${hasNote?'has-note':''}" onclick="openNote(event,'${p.id}')" title="Notes / Solution">${noteIcon}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  if (!html) html = `<div class="empty-state"><p>No problems match your search</p></div>`;
  document.getElementById('problem-list').innerHTML = html;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── Interactions ─────────────────────────────────────────────────────────────
window.selectTopic = id => { state.activeTopicId = id; renderSidebar(); renderMain(); };

window.toggleCheck = (e, id) => {
  e.stopPropagation();
  state.checked[id] = !state.checked[id];
  scheduleSave();
  updateOverallProgress();
  renderSidebar();
  renderMain();
  // If solution panel is open on this problem, refresh it
  if (state.activeNoteId === id && state.activeTab === 'solution') renderSolution();
};

window.openNote = (e, id) => {
  e.stopPropagation();
  const p   = PMAP[id];
  const sol = SOLUTIONS[id] || GENERATED_SOLUTIONS[id];
  const lc  = p.lc || '';
  const tuf = TUF[id] || sol?.tuf || ('https://www.google.com/search?q=' + encodeURIComponent(p.name + ' site:takeuforward.org'));
  const nc  = sol?.nc || '';

  state.activeNoteId = id;
  state._panelMeta = { id, name: p.name, lc, tuf, nc };

  document.getElementById('notes-title').textContent = p.name;
  document.getElementById('notes-textarea').value = state.notes[id] || '';

  const extIcon = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
  let links = '';
  if (lc)  links += `<a class="link-chip" href="${lc}"  target="_blank">${extIcon} LeetCode</a>`;
  if (tuf) links += `<a class="link-chip" href="${tuf}" target="_blank">${extIcon} TUF</a>`;
  if (nc)  links += `<a class="link-chip" href="${nc}"  target="_blank">${extIcon} NeetCode</a>`;
  document.getElementById('notes-links').innerHTML = links;

  document.getElementById('notes-panel').classList.add('open');
  window.switchTab(state.activeTab || 'notes');
  if (state.activeTab !== 'solution') document.getElementById('notes-textarea').focus();
};

window.closeNotes = () => {
  document.getElementById('notes-panel').classList.remove('open');
  state.activeNoteId = null;
};

window.switchTab = (tab) => {
  state.activeTab = tab;
  document.getElementById('tab-notes').classList.toggle('active', tab === 'notes');
  document.getElementById('tab-solution').classList.toggle('active', tab === 'solution');
  document.getElementById('pane-notes').classList.toggle('active', tab === 'notes');
  document.getElementById('pane-solution').classList.toggle('active', tab === 'solution');
  if (tab === 'solution') renderSolution();
};

function renderSolution() {
  const meta = state._panelMeta;
  if (!meta) return;
  const { id, lc, tuf, nc } = meta;
  const done = !!state.checked[id];
  const sol = SOLUTIONS[id] || GENERATED_SOLUTIONS[id];
  const el = document.getElementById('sol-scroll');
  const extIcon = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

  if (!done) {
    el.innerHTML = `
      <div class="sol-locked">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <p>Mark this problem as done<br>to unlock the solution.</p>
      </div>`;
    return;
  }

  let linksHtml = '';
  if (lc)  linksHtml += `<a class="link-chip" href="${lc}"  target="_blank">${extIcon} LeetCode</a>`;
  if (tuf) linksHtml += `<a class="link-chip" href="${tuf}" target="_blank">${extIcon} TakeUForward</a>`;
  if (nc)  linksHtml += `<a class="link-chip" href="${nc}"  target="_blank">${extIcon} NeetCode</a>`;

  let cardsHtml = '';
  if (sol?.steps?.length) {
    cardsHtml = sol.steps.map(s => {
      const cls = s.label === 'optimal' ? 'optimal' : s.label === 'better' ? 'better' : s.label === 'brute' ? 'brute' : 'optimal';
      return `<div class="sol-card">
        <div class="sol-card-head">
          <span class="sol-label ${cls}">${s.label}</span>
          <span class="sol-complexity">TC: ${s.tc} &nbsp;|&nbsp; SC: ${s.sc}</span>
        </div>
        <div class="sol-desc">${escHtml(s.desc)}</div>
      </div>`;
    }).join('');
  } else {
    cardsHtml = `<p class="sol-no-data">No inline solution data yet.<br>Use the TakeUForward / NeetCode links above for the full brute → optimal breakdown.</p>`;
  }

  el.innerHTML = `
    ${linksHtml ? `<div class="sol-links">${linksHtml}</div>` : ''}
    <div class="sol-cards">${cardsHtml}</div>`;
}

document.getElementById('notes-textarea').addEventListener('input', function() {
  const id = state.activeNoteId;
  if (!id) return;
  state.notes[id] = this.value;
  clearTimeout(notesSaveTimeout);
  notesSaveTimeout = setTimeout(() => {
    scheduleSave();
    const ind = document.getElementById('saved-indicator');
    ind.classList.add('show');
    setTimeout(() => ind.classList.remove('show'), 1500);
    renderMain();
  }, 600);
});

document.getElementById('search-input').addEventListener('input', function() {
  state.search = this.value;
  renderMain();
});
</script>
</body>
</html>
